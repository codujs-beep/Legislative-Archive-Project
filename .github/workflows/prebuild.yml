name: Pre-generate AI summaries

on:
  schedule:
    - cron: '0 2 * * *'   # 매일 오전 11시 KST (UTC 02:00)
  workflow_dispatch:        # 수동 실행 버튼
  push:
    branches: [main]
    paths-ignore:
      - 'data/**'           # data 폴더 변경은 재귀 방지

jobs:
  prebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate card summaries
        run: node scripts/prebuild.mjs

      - name: Commit & push updated summaries
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data/card-summaries.json
          git diff --staged --quiet && echo "No changes" || \
            git commit -m "chore: update pre-generated AI summaries [skip ci]" && git push
